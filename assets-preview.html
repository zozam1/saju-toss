<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>오늘의 운세 Assets</title>
<style>
  body { background: #111; color: #fff; font-family: sans-serif; padding: 20px; }
  canvas { display: block; margin: 16px 0; border: 2px solid #333; }
  button { background: #1C1C5E; color: #fff; border: none; padding: 10px 22px; border-radius: 8px; cursor: pointer; font-size: 14px; margin: 4px; }
  h2 { color: #C9A84C; margin-top: 28px; }
</style>
</head>
<body>
<h1 style="color:#C9A84C">오늘의 운세 — Assets Generator</h1>

<h2>App Icon (600×600)</h2>
<canvas id="icon" width="600" height="600"></canvas>
<button onclick="dl('icon','saju_icon.png')">아이콘 다운로드</button>

<h2>Banner (1932×828)</h2>
<canvas id="banner" width="1932" height="828"></canvas>
<button onclick="dl('banner','saju_banner.png')">배너 다운로드</button>

<script>
/* ── 공통 유틸 ── */
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

/* ── 한자 원 그리기 ── */
function drawHanjaCircle(ctx, x, y, r, char, charSize, ringColor, charColor) {
  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.strokeStyle = ringColor;
  ctx.lineWidth = r * 0.08;
  ctx.stroke();

  // 내부 십자선 (사주 느낌)
  ctx.globalAlpha = 0.25;
  ctx.strokeStyle = ringColor;
  ctx.lineWidth = r * 0.03;
  ctx.beginPath(); ctx.moveTo(x - r*0.6, y); ctx.lineTo(x + r*0.6, y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, y - r*0.6); ctx.lineTo(x, y + r*0.6); ctx.stroke();
  ctx.globalAlpha = 1;

  ctx.fillStyle = charColor;
  ctx.font = `bold ${charSize}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(char, x, y + charSize * 0.06);
  ctx.restore();
}

/* ── 아이콘 ── */
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const W = 600, H = 600;

  // 배경 — 꽉 찬 사각형 (절대 roundRect 사용 안 함)
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#0D0D3B');
  bg.addColorStop(1, '#1C1C5E');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // 별 장식
  const stars = [
    [80,80,2],[520,60,1.5],[560,200,2.5],[40,300,1.5],[580,400,2],
    [100,500,1.8],[500,520,1.5],[300,30,2],[200,560,1.5],[520,480,2],
  ];
  stars.forEach(([sx,sy,sr]) => {
    ctx.save();
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // 중앙 큰 원 (테두리)
  ctx.save();
  ctx.beginPath();
  ctx.arc(300, 270, 175, 0, Math.PI*2);
  const ringGrad = ctx.createLinearGradient(125,95,475,445);
  ringGrad.addColorStop(0, '#C9A84C');
  ringGrad.addColorStop(1, '#E8C97A');
  ctx.strokeStyle = ringGrad;
  ctx.lineWidth = 5;
  ctx.stroke();
  ctx.restore();

  // 원 내부 반투명
  ctx.save();
  ctx.beginPath();
  ctx.arc(300, 270, 170, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  ctx.fill();
  ctx.restore();

  // 운(運) 한자
  ctx.save();
  ctx.shadowColor = '#C9A84C';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#C9A84C';
  ctx.font = 'bold 160px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('運', 300, 278);
  ctx.restore();

  // 팔괘 장식 — 작은 원 8개
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2 - Math.PI / 2;
    const ex = 300 + Math.cos(angle) * 195;
    const ey = 270 + Math.sin(angle) * 195;
    ctx.save();
    ctx.beginPath();
    ctx.arc(ex, ey, 7, 0, Math.PI*2);
    ctx.fillStyle = '#C9A84C';
    ctx.globalAlpha = 0.7;
    ctx.fill();
    ctx.restore();
  }

  // 텍스트: 오늘의 운세
  ctx.save();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 52px "Apple SD Gothic Neo", "Noto Sans KR", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('오늘의 운세', 300, 490);
  ctx.restore();

  // 영문
  ctx.save();
  ctx.fillStyle = 'rgba(201,168,76,0.8)';
  ctx.font = '22px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Daily Fortune', 300, 540);
  ctx.restore();
}

/* ── 배너 ── */
function drawBanner(canvas) {
  const ctx = canvas.getContext('2d');
  const W = 1932, H = 828;

  // 배경 — 꽉 찬 사각형
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#080828');
  bg.addColorStop(0.5, '#0D0D3B');
  bg.addColorStop(1, '#1a1040');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // 별 장식
  const stars = [
    [100,80,3],[300,150,2],[500,50,2.5],[150,600,2],[700,700,3],
    [1800,100,2.5],[1700,600,2],[1600,200,3],[1850,500,2],[1500,700,2.5],
    [900,30,2],[1100,780,2],[400,400,1.5],[1300,100,2.5],
  ];
  stars.forEach(([sx,sy,sr]) => {
    ctx.save();
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = Math.random() * 0.4 + 0.3;
    ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // 왼쪽: 큰 원 + 運 한자
  ctx.save();
  ctx.beginPath();
  ctx.arc(320, 414, 280, 0, Math.PI*2);
  const ringG = ctx.createLinearGradient(40,134,600,694);
  ringG.addColorStop(0, '#C9A84C');
  ringG.addColorStop(1, '#E8C97A');
  ctx.strokeStyle = ringG;
  ctx.lineWidth = 6;
  ctx.stroke();
  ctx.restore();

  // 원 내부
  ctx.save();
  ctx.beginPath();
  ctx.arc(320, 414, 274, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  ctx.fill();
  ctx.restore();

  // 팔괘 점
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2 - Math.PI / 2;
    ctx.save();
    ctx.beginPath();
    ctx.arc(320 + Math.cos(angle)*307, 414 + Math.sin(angle)*307, 9, 0, Math.PI*2);
    ctx.fillStyle = '#C9A84C';
    ctx.globalAlpha = 0.75;
    ctx.fill();
    ctx.restore();
  }

  ctx.save();
  ctx.shadowColor = '#C9A84C';
  ctx.shadowBlur = 50;
  ctx.fillStyle = '#C9A84C';
  ctx.font = 'bold 260px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('運', 320, 425);
  ctx.restore();

  // 오른쪽 텍스트
  ctx.save();
  ctx.fillStyle = '#C9A84C';
  ctx.font = 'bold 110px "Apple SD Gothic Neo", "Noto Sans KR", sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('오늘의 운세', 700, 310);
  ctx.restore();

  ctx.save();
  ctx.fillStyle = '#fff';
  ctx.font = '52px "Apple SD Gothic Neo", "Noto Sans KR", sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('내 사주로 보는 오늘의 운', 702, 430);
  ctx.restore();

  ctx.save();
  ctx.fillStyle = 'rgba(201,168,76,0.65)';
  ctx.font = '38px Georgia, serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('Daily Fortune · AI 사주 상담', 704, 530);
  ctx.restore();

  // 구분선
  ctx.save();
  ctx.strokeStyle = 'rgba(201,168,76,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(700, 470); ctx.lineTo(1820, 470);
  ctx.stroke();
  ctx.restore();
}

function dl(id, name) {
  const a = document.createElement('a');
  a.download = name;
  a.href = document.getElementById(id).toDataURL('image/png');
  a.click();
}

drawIcon(document.getElementById('icon'));
drawBanner(document.getElementById('banner'));
</script>
</body>
</html>
